<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FIFA World Cup 2026 Tracker</title>
  <!-- Favicon as data URI (no extra HTTP request) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2315803d'/%3E%3Ccircle cx='50' cy='50' r='25' fill='white'/%3E%3Cpolygon points='50,15 65,40 85,45 70,65 75,85 50,75 25,85 30,65 15,45 35,40' fill='%2315803d'/%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      theme: {
        fontFamily: {
          sans: ['system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'sans-serif'],
        },
      }
    }
  </script>
</head>
<body class="bg-gray-100 text-gray-900">

<div class="max-w-7xl mx-auto px-4 py-6">
  <header class="text-center mb-8">
    <h1 class="text-3xl md:text-4xl font-bold text-green-700">⚽ FIFA World Cup 2026</h1>
    <p class="text-gray-600 text-sm mt-1">Live standings, matches & player stats — low‑data mode</p>
    <div class="flex justify-between items-center mt-3 text-xs text-gray-500">
      <span id="last-updated">Loading...</span>
      <button id="refresh-btn" class="bg-green-600 text-white px-3 py-1 rounded-full hover:bg-green-700">↻ Refresh</button>
    </div>
  </header>

  <!-- Tab navigation -->
  <div class="flex flex-wrap gap-2 border-b border-gray-300 mb-6">
    <button data-tab="standings" class="tab-btn py-2 px-4 font-semibold text-green-700 border-b-2 border-green-700">🏆 Standings</button>
    <button data-tab="matches" class="tab-btn py-2 px-4 font-semibold text-gray-600 hover:text-green-600">📅 Matches</button>
    <button data-tab="stats" class="tab-btn py-2 px-4 font-semibold text-gray-600 hover:text-green-600">⭐ Player Stats</button>
  </div>

  <!-- Standings view -->
  <div id="standings-view" class="tab-content">
    <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
      <!-- groups injected here -->
    </div>
  </div>

  <!-- Matches view -->
  <div id="matches-view" class="tab-content hidden">
    <div class="space-y-4">
      <!-- matches injected here -->
    </div>
  </div>

  <!-- Stats view -->
  <div id="stats-view" class="tab-content hidden">
    <div class="grid md:grid-cols-3 gap-6">
      <div><h2 class="text-xl font-bold mb-3">⚽ Top Scorers</h2><ul id="top-scorers" class="space-y-2"></ul></div>
      <div><h2 class="text-xl font-bold mb-3">🎯 Top Assists</h2><ul id="top-assists" class="space-y-2"></ul></div>
      <div><h2 class="text-xl font-bold mb-3">🟨 Most Cards</h2><ul id="most-cards" class="space-y-2"></ul></div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
